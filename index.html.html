<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split Screen Display Panel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    background: #000;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  /* ── MAIN GRID ── */
  .main-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3px;
    background: #111;
    min-height: 0;
  }

  /* Panel base */
  .panel {
    position: relative;
    background: #0a0a0a;
    overflow: hidden;
  }

  /* Content 1 — top-left, full cell */
  #panel1 { grid-column: 1; grid-row: 1; }

  /* Content 2 — top-right, full cell */
  #panel2 { grid-column: 2; grid-row: 1; }

  /* Content 3 — bottom-left */
  #panel3 { grid-column: 1; grid-row: 2; }

  /* Bottom-right quad grid */
  #panel-quad {
    grid-column: 2;
    grid-row: 2;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3px;
    background: #111;
  }

  .quad-panel {
    position: relative;
    background: #0a0a0a;
    overflow: hidden;
  }

  /* iframes fill panels */
  iframe, .slideshow-wrap {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Slideshow */
  .slideshow-wrap { overflow: hidden; }
  .slide {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }
  .slide.active { opacity: 1; }

  /* Slide counter badge */
  .slide-badge {
    position: absolute;
    bottom: 10px;
    right: 12px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    z-index: 10;
    pointer-events: none;
    letter-spacing: 0.5px;
  }

  /* ── FLOATING LOGO ── */
  #logo {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 100;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 2.5px solid rgba(255,255,255,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  #logo:hover { transform: scale(1.07); border-color: #fff; }
  #logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: none;
  }
  #logo-text {
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.2;
  }

  /* ── FOOTER ── */
  #footer {
    height: 44px;
    background: #1a7a45;
    display: flex;
    align-items: center;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }

  /* Digital clock */
  #clock {
    flex-shrink: 0;
    width: 160px;
    padding: 0 14px;
    background: rgba(0,0,0,0.30);
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-right: 1.5px solid rgba(255,255,255,0.25);
  }
  #clock-time {
    color: #fff;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 2px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  #clock-date {
    color: rgba(255,255,255,0.78);
    font-size: 9.5px;
    letter-spacing: 0.6px;
    margin-top: 2px;
    text-transform: uppercase;
  }

  /* Running text */
  .marquee-track {
    flex: 1;
    overflow: hidden;
    height: 100%;
    display: flex;
    align-items: center;
  }
  .marquee-inner {
    display: flex;
    white-space: nowrap;
    animation: marquee-scroll 40s linear infinite;
  }
  .marquee-inner span {
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    padding-right: 80px;
    letter-spacing: 0.3px;
  }
  .marquee-inner .bullet {
    color: #a8ffcf;
    padding-right: 80px;
    font-size: 18px;
  }
  @keyframes marquee-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* Label overlay (optional debug) */
  .panel-label {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.45);
    color: rgba(255,255,255,0.6);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    pointer-events: none;
    z-index: 5;
    display: none; /* set to block to debug */
  }

  /* Config Modal */
  #config-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 9999;
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.4);
    color: #fff;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: background 0.2s;
  }
  #config-btn:hover { background: rgba(255,255,255,0.22); }

  #config-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
  }
  #config-modal.open { display: flex; }
  .modal-box {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 14px;
    padding: 28px 32px;
    width: min(660px, 96vw);
    max-height: 90vh;
    overflow-y: auto;
    color: #eee;
  }
  .modal-box h2 {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 20px;
    color: #fff;
  }
  .modal-box label {
    display: block;
    font-size: 12px;
    color: #aaa;
    margin-bottom: 4px;
    margin-top: 14px;
  }
  .modal-box input[type="text"],
  .modal-box textarea {
    width: 100%;
    background: #111;
    border: 1px solid #333;
    color: #eee;
    border-radius: 7px;
    padding: 8px 10px;
    font-size: 13px;
    outline: none;
    resize: vertical;
  }
  .modal-box input:focus, .modal-box textarea:focus { border-color: #1a7a45; }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 22px;
    justify-content: flex-end;
  }
  .btn-apply {
    background: #1a7a45;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 22px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
  }
  .btn-apply:hover { background: #148a3a; }
  .btn-cancel {
    background: transparent;
    color: #aaa;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 9px 22px;
    font-size: 14px;
    cursor: pointer;
  }
  .btn-cancel:hover { background: #222; }
  .section-divider {
    border: none;
    border-top: 1px solid #2a2a2a;
    margin: 18px 0 4px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: #1a7a45;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 16px;
    margin-bottom: 2px;
  }
</style>
</head>
<body>

<!-- Config button -->
<button id="config-btn" onclick="openConfig()">⚙ Konfigurasi</button>

<!-- Config Modal -->
<div id="config-modal">
  <div class="modal-box">
    <h2>⚙ Pengaturan Panel</h2>

    <div class="section-title">Video</div>
    <hr class="section-divider">
    <label>Content 1 — URL Video (embed)</label>
    <input type="text" id="cfg-v1" placeholder="https://www.youtube.com/embed/VIDEO_ID">
    <label>Content 2 — URL Video (embed)</label>
    <input type="text" id="cfg-v2" placeholder="https://www.youtube.com/embed/VIDEO_ID">
    <label>Content 4 — URL Video (embed)</label>
    <input type="text" id="cfg-v4" placeholder="https://www.youtube.com/embed/VIDEO_ID">
    <label>Content 5 — URL Video (embed)</label>
    <input type="text" id="cfg-v5" placeholder="https://www.youtube.com/embed/VIDEO_ID">
    <label>Content 6 — URL Video (embed)</label>
    <input type="text" id="cfg-v6" placeholder="https://www.youtube.com/embed/VIDEO_ID">
    <label>Content 7 — URL Video (embed)</label>
    <input type="text" id="cfg-v7" placeholder="https://www.youtube.com/embed/VIDEO_ID">

    <div class="section-title" style="margin-top:20px;">Foto Slideshow (Content 3)</div>
    <hr class="section-divider">
    <label>URL Foto (satu per baris, durasi 10 detik per slide)</label>
    <textarea id="cfg-photos" rows="5" placeholder="https://example.com/foto1.jpg&#10;https://example.com/foto2.jpg&#10;https://example.com/foto3.jpg"></textarea>

    <div class="section-title" style="margin-top:20px;">Running Text</div>
    <hr class="section-divider">
    <label>Teks Berjalan (pisahkan dengan tanda " | ")</label>
    <textarea id="cfg-marquee" rows="3" placeholder="Selamat datang di Display Kami | Informasi terkini hadir setiap saat | Terima kasih telah menggunakan layanan kami"></textarea>

    <div class="section-title" style="margin-top:20px;">Logo</div>
    <hr class="section-divider">
    <label>URL Gambar Logo (kosongkan untuk teks "LOGO")</label>
    <input type="text" id="cfg-logo" placeholder="https://cloud.knwng.my.id/apps/photos/api/v1/publicPreview/7229?x=2048&y=2048&token=cSoeUsaqYrlMtKRHyuHVMsKw3jndSP8Q">

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeConfig()">Batal</button>
      <button class="btn-apply" onclick="applyConfig()">Terapkan</button>
    </div>
  </div>
</div>

<!-- MAIN GRID -->
<div class="main-grid">

  <!-- Content 1: Video top-left -->
  <div class="panel" id="panel1">
    <span class="panel-label">Content 1</span>
    <iframe id="iframe1"
      src="https://www.youtube.com/embed/videoseries?si=SBXiy7BZTEKbAe2B&amp;controls=0&amp;list=PLSb-Z2MgUCqhHlzA_bleQIdO3oN0kH2dy"
      allow="autoplay; encrypted-media"
      allowfullscreen></iframe>
    <div id="logo">
      <img id="logo-img" src="" alt="Logo">
      <span id="logo-text">LOGO</span>
    </div>
  </div>

  <!-- Content 2: Video top-right -->
  <div class="panel" id="panel2">
    <span class="panel-label">Content 2</span>
    <iframe id="iframe2"
      src="https://www.youtube.com/embed/qbxprL02jWk?si=-wF5faFcDYIuot5r?rel=0&autoplay=1&mute=1"
      allow="autoplay; encrypted-media"
      allowfullscreen></iframe>
  </div>

  <!-- Content 3: Slideshow bottom-left -->
  <div class="panel" id="panel3">
    <span class="panel-label">Content 3</span>
    <div class="slideshow-wrap" id="slideshow-wrap">
      <!-- slides injected by JS -->
    </div>
    <div class="slide-badge" id="slide-badge">1 / 1</div>
  </div>

  <!-- Bottom-right quad -->
  <div id="panel-quad">
    <div class="quad-panel">
      <span class="panel-label">Content 4</span>
      <iframe id="iframe4"
        src="https://smartcctv.wonogirikab.go.id/c7766874-0719-4e41-a1ba-84335183074a.html"
        allow="autoplay; encrypted-media"
        allowfullscreen></iframe>
    </div>
    <div class="quad-panel">
      <span class="panel-label">Content 5</span>
      <iframe id="iframe5"
        src="https://smartcctv.wonogirikab.go.id/a7dbe953-cbe9-41fa-a84a-6ac8a625775b.html"
        allow="autoplay; encrypted-media"
        allowfullscreen></iframe>
    </div>
    <div class="quad-panel">
      <span class="panel-label">Content 6</span>
      <iframe id="iframe6"
        src="https://smartcctv.wonogirikab.go.id/9561a139-5931-4638-92e9-3e5790070a7d.html"
        allow="autoplay; encrypted-media"
        allowfullscreen></iframe>
    </div>
    <div class="quad-panel">
      <span class="panel-label">Content 7</span>
      <iframe id="iframe7"
        src="https://smartcctv.wonogirikab.go.id/46a77cc1-dd3a-41f8-9c4c-8508d79ef368.html"
        allow="autoplay; encrypted-media"
        allowfullscreen></iframe>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div id="footer">
  <div id="clock">
    <div id="clock-time">00:00:00</div>
    <div id="clock-date">Sen, 01 Jan 2025</div>
  </div>
  <div class="marquee-track">
    <div class="marquee-inner" id="marquee-inner">
      <!-- injected by JS (doubled for seamless loop) -->
    </div>
  </div>
</div>

<script>
/* ───────── STATE ───────── */
const DEFAULT_SLIDES = [
  "https://cloud.knwng.my.id/apps/photos/api/v1/publicPreview/7143?x=2048&y=2048&token=cSoeUsaqYrlMtKRHyuHVMsKw3jndSP8Q",
  "https://cloud.knwng.my.id/apps/photos/api/v1/publicPreview/7154?x=2048&y=2048&token=cSoeUsaqYrlMtKRHyuHVMsKw3jndSP8Q",
  "https://cloud.knwng.my.id/apps/photos/api/v1/publicPreview/7142?x=2048&y=2048&token=cSoeUsaqYrlMtKRHyuHVMsKw3jndSP8Q",
 "https://cloud.knwng.my.id/apps/photos/api/v1/publicPreview/7194?x=2048&y=2048&token=cSoeUsaqYrlMtKRHyuHVMsKw3jndSP8Q",
 "https://cloud.knwng.my.id/apps/photos/api/v1/publicPreview/7193?x=2048&y=2048&token=cSoeUsaqYrlMtKRHyuHVMsKw3jndSP8Q",
 ""
];

const DEFAULT_MARQUEE = "LAPINHAR HARI INI = 2 | LAPINSUS HARI INI = | SIACC HARI INI = | AGENDA HARI INI = | UNDANGAN = Menghadiri Pernikahan Daniel Simanjuntak & Agustina Dogiyai";

let slides = [...DEFAULT_SLIDES];
let currentSlide = 0;
let slideInterval = null;

/* ───────── CLOCK ───────── */
function updateClock() {
  const now = new Date();
  const days = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock-time').textContent = `${hh}:${mm}:${ss}`;
  document.getElementById('clock-date').textContent =
    `${days[now.getDay()]}, ${String(now.getDate()).padStart(2,'0')} ${months[now.getMonth()]} ${now.getFullYear()}`;
}
setInterval(updateClock, 1000);
updateClock();

/* ───────── SLIDESHOW ───────── */
function buildSlideshow(urls) {
  const wrap = document.getElementById('slideshow-wrap');
  wrap.innerHTML = '';
  urls.forEach((url, i) => {
    const img = document.createElement('img');
    img.className = 'slide' + (i === 0 ? ' active' : '');
    img.src = url;
    img.alt = `Slide ${i+1}`;
    wrap.appendChild(img);
  });
  updateSlideBadge(0, urls.length);
}

function updateSlideBadge(idx, total) {
  document.getElementById('slide-badge').textContent = `${idx+1} / ${total}`;
}

function startSlideshow() {
  if (slideInterval) clearInterval(slideInterval);
  buildSlideshow(slides);
  slideInterval = setInterval(() => {
    const allSlides = document.querySelectorAll('.slide');
    if (!allSlides.length) return;
    allSlides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % allSlides.length;
    allSlides[currentSlide].classList.add('active');
    updateSlideBadge(currentSlide, allSlides.length);
  }, 10000);
}

startSlideshow();

/* ───────── MARQUEE ───────── */
function buildMarquee(text) {
  const inner = document.getElementById('marquee-inner');
  inner.innerHTML = '';
  const parts = text.split('|').map(s => s.trim()).filter(Boolean);
  // Double for seamless loop
  [0,1].forEach(() => {
    parts.forEach((part, i) => {
      const s = document.createElement('span');
      s.textContent = part;
      inner.appendChild(s);
      if (i < parts.length - 1) {
        const b = document.createElement('span');
        b.className = 'bullet';
        b.textContent = '◆';
        inner.appendChild(b);
      }
    });
    const sep = document.createElement('span');
    sep.className = 'bullet';
    sep.textContent = '◆';
    inner.appendChild(sep);
  });
}

buildMarquee(DEFAULT_MARQUEE);

/* ───────── CONFIG MODAL ───────── */
function openConfig() {
  document.getElementById('config-modal').classList.add('open');
}
function closeConfig() {
  document.getElementById('config-modal').classList.remove('open');
}

function applyConfig() {
  const v1 = document.getElementById('cfg-v1').value.trim();
  const v2 = document.getElementById('cfg-v2').value.trim();
  const v4 = document.getElementById('cfg-v4').value.trim();
  const v5 = document.getElementById('cfg-v5').value.trim();
  const v6 = document.getElementById('cfg-v6').value.trim();
  const v7 = document.getElementById('cfg-v7').value.trim();
  const photos = document.getElementById('cfg-photos').value.trim();
  const marqueeText = document.getElementById('cfg-marquee').value.trim();
  const logoUrl = document.getElementById('cfg-logo').value.trim();

  if (v1) document.getElementById('iframe1').src = v1;
  if (v2) document.getElementById('iframe2').src = v2;
  if (v4) document.getElementById('iframe4').src = v4;
  if (v5) document.getElementById('iframe5').src = v5;
  if (v6) document.getElementById('iframe6').src = v6;
  if (v7) document.getElementById('iframe7').src = v7;

  if (photos) {
    slides = photos.split('\n').map(s=>s.trim()).filter(Boolean);
    currentSlide = 0;
    startSlideshow();
  }

  if (marqueeText) buildMarquee(marqueeText);

  if (logoUrl) {
    const img = document.getElementById('logo-img');
    const txt = document.getElementById('logo-text');
    img.src = logoUrl;
    img.style.display = 'block';
    txt.style.display = 'none';
  }

  closeConfig();
}

/* Close modal on backdrop click */
document.getElementById('config-modal').addEventListener('click', function(e) {
  if (e.target === this) closeConfig();
});
</script>
</body>
</html>
